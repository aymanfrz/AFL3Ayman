<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ayman's Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#fefefe] text-black flex flex-col min-h-screen">

    <nav class="bg-[#4a4a4a] text-white p-5 flex justify-center sticky top-0 z-50">
        <ul class="flex space-x-6">
            <li><a href="index.html" class="hover:text-white-600">Home</a></li>
            <li><a href="hobby.html" class="hover:text-white-600">Hobby</a></li>
            <li><a href="gallery.html" class="hover:text-white-600">Photo Gallery</a></li>
        </ul>
    </nav>

    <div class="mt-8 flex flex-col items-center">
        <img id="profilePhoto" src="AARF.png" alt="Ayman's Logo"
            class="w-60 h-60 object-cover rounded-full border-4 border-white shadow-lg cursor-pointer transition transform hover:scale-105 hover:shadow-2xl" />
        <div class="mt-4 text-xl font-semibold text-black">Achmad Ayman Rasjid Fahrezi</div>
    </div>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-10 bg-[#d5c2bd] rounded-xl shadow-lg text-black mt-12">
        <section>
            <h2 class="text-3xl font-semibold mb-6">Photo Gallery</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">

                <div
                    class="bg-white text-black shadow p-4 rounded flex flex-col items-center cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 hover:shadow-2xl hobby-card">
                    <img src="drawing.jpg" alt="Drawing" class="w-full h-40 object-cover rounded mb-2">
                    <h3 class="text-lg font-semibold">Drawing</h3>
                </div>

                <div
                    class="bg-white text-black shadow p-4 rounded flex flex-col items-center cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 hover:shadow-2xl hobby-card">
                    <img src="chess.jpg" alt="Chess" class="w-full h-40 object-cover rounded mb-2">
                    <h3 class="text-lg font-semibold">Chess</h3>
                </div>

                <div
                    class="bg-white text-black shadow p-4 rounded flex flex-col items-center cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 hover:shadow-2xl hobby-card">
                    <img src="football.jpg" alt="Football" class="w-full h-40 object-cover rounded mb-2">
                    <h3 class="text-lg font-semibold">Football</h3>
                </div>

                <div
                    class="bg-white text-black shadow p-4 rounded flex flex-col items-center cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 hover:shadow-2xl hobby-card">
                    <img src="music.jpg" alt="Music" class="w-full h-40 object-cover rounded mb-2">
                    <h3 class="text-lg font-semibold">Music</h3>
                </div>

                <div
                    class="bg-white text-black shadow p-4 rounded flex flex-col items-center cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 hover:shadow-2xl hobby-card">
                    <img src="basketball.jpg" alt="Basketball" class="w-full h-40 object-cover rounded mb-2">
                    <h3 class="text-lg font-semibold">Basketball</h3>
                </div>

                <div
                    class="bg-white text-black shadow p-4 rounded flex flex-col items-center cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 hover:shadow-2xl hobby-card">
                    <img src="videogames.jpg" alt="Video Games" class="w-full h-40 object-cover rounded mb-2">
                    <h3 class="text-lg font-semibold">Video Games</h3>
                </div>

            </div>
        </section>
    </main>

    <footer class="bg-[#4a4a4a] text-white py-8 px-10 mt-12 flex justify-end items-center space-x-4">
        <p class="text-xl font-medium">Contact me!</p>

        <img src="LogoWhatsApp.jpg" alt="WhatsApp" class="w-10 h-10">

        <img src="LogoInstagram.jpg" alt="Instagram" class="w-10 h-10">
    </footer>

    <div id="photoModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center hidden z-50">
        <div class="relative max-w-4xl max-h-full">
            <button id="closeModal"
                class="absolute top-2 right-2 text-white text-3xl font-bold hover:text-gray-300">&times;</button>
            <img id="modalImage" src="" alt="Fullscreen" class="max-w-full max-h-screen rounded-lg shadow-lg" />
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
